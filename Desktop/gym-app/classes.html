<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classes - Gwadar Diesel Gym</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR -->
  <div id="navbar-container"></div>

  <!-- MAIN CONTENT -->
  <div class="dashboard-screen">
    <div id="classesSection" class="section active">
      <div class="container">
        <div class="section-header">
          <h2>📅 Fitness Classes</h2>
          <p class="section-subtitle">Join group training sessions</p>
        </div>

        <!-- CREATE CLASS FORM (Trainers/Admin only) -->
        <div id="classFormSection" style="display:none;">
          <div class="class-form-card">
            <h3>Create New Class</h3>
            <div class="form-grid">
              <div class="form-group">
                <label for="className">Class Name</label>
                <input type="text" id="className" class="input" placeholder="e.g., HIIT Training">
              </div>
              <div class="form-group">
                <label for="classTime">Time</label>
                <input type="time" id="classTime" class="input">
              </div>
              <div class="form-group">
                <label for="classCapacity">Capacity</label>
                <input type="number" id="classCapacity" class="input" placeholder="20">
              </div>
            </div>
            <button onclick="createClass()" class="btn btn-primary btn-lg">Create Class</button>
          </div>
          <div class="section-divider"></div>
        </div>

        <!-- CLASSES LIST -->
        <div class="classes-list-section">
          <h3>Available Classes</h3>
          <div id="classList" class="class-list">
            <p class="empty-message">No classes available at the moment. Check back soon!</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- SHARED SCRIPTS -->
  <script type="module" src="app.js"></script>
  <script type="module" src="pages/classes-page.js"></script>
</body>
</html>
