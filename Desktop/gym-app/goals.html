<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goals - Gwadar Diesel Gym</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR -->
  <div id="navbar-container"></div>

  <!-- MAIN CONTENT -->
  <div class="dashboard-screen">
    <div id="goalsSection" class="section active">
      <div class="container">
        <div class="section-header">
          <h2>🎯 Fitness Goals</h2>
          <p class="section-subtitle">Set and track your fitness objectives</p>
        </div>

        <div class="goal-form-card">
          <h3>Create New Goal</h3>
          <div class="form-grid">
            <div class="form-group">
              <label for="goalName">Goal Name</label>
              <input type="text" id="goalName" class="input" placeholder="e.g., Lose 5 kg">
            </div>
            <div class="form-group">
              <label for="goalType">Goal Type</label>
              <select id="goalType" class="input">
                <option>Weight Loss</option>
                <option>Muscle Gain</option>
                <option>Endurance</option>
                <option>Strength</option>
                <option>Flexibility</option>
              </select>
            </div>
            <div class="form-group">
              <label for="goalTarget">Target Value</label>
              <input type="text" id="goalTarget" class="input" placeholder="e.g., 70 kg">
            </div>
            <div class="form-group">
              <label for="goalDeadline">Deadline</label>
              <input type="date" id="goalDeadline" class="input">
            </div>
          </div>
          <button onclick="setGoal()" class="btn btn-primary btn-lg">Create Goal</button>
        </div>

        <div class="section-divider"></div>

        <div class="goals-list-section">
          <h3>📋 Your Goals</h3>
          <div id="goalsList" class="goals-list">
            <p class="empty-message">No goals set yet. Create your first goal!</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- SHARED SCRIPTS -->
  <script type="module" src="app.js"></script>
  <script type="module" src="pages/goals-page.js"></script>
</body>
</html>
