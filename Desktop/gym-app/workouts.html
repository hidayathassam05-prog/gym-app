<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workouts - Gwadar Diesel Gym</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR -->
  <div id="navbar-container"></div>

  <!-- MAIN CONTENT -->
  <div class="dashboard-screen">
    <div id="workoutsSection" class="section active">
      <div class="container">
        <div class="section-header">
          <h2>🏋️ Log Your Workouts</h2>
          <p class="section-subtitle">Track your fitness activities</p>
        </div>

        <div class="workout-form-card">
          <h3>New Workout Entry</h3>
          <div class="form-grid">
            <div class="form-group">
              <label for="exerciseType">Exercise Type</label>
              <input type="text" id="exerciseType" class="input" placeholder="e.g., Bench Press">
            </div>
            <div class="form-group">
              <label for="duration">Duration (minutes)</label>
              <input type="number" id="duration" class="input" placeholder="30">
            </div>
            <div class="form-group">
              <label for="sets">Sets</label>
              <input type="number" id="sets" class="input" placeholder="3">
            </div>
            <div class="form-group">
              <label for="reps">Reps</label>
              <input type="number" id="reps" class="input" placeholder="10">
            </div>
            <div class="form-group">
              <label for="calories">Calories Burned</label>
              <input type="number" id="calories" class="input" placeholder="100">
            </div>
          </div>
          <button onclick="logWorkout()" class="btn btn-primary btn-lg">Log Workout</button>
        </div>

        <div class="section-divider"></div>

        <div class="workouts-list-section">
          <h3>📊 Your Workouts</h3>
          <div id="workoutsList" class="workouts-list">
            <p class="empty-message">No workouts logged yet</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- SHARED SCRIPTS -->
  <script type="module" src="app.js"></script>
  <script type="module" src="pages/workouts-page.js"></script>
</body>
</html>
